<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Theme Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f0f0f0;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 6px;
    font-family: 'Noto Serif KR', serif;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #9ca3af;
    margin-bottom: 36px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
    max-width: 980px;
    margin: 0 auto;
  }
  .theme-card {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  .theme-label {
    padding: 14px 18px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .theme-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .theme-name { font-size: 15px; font-weight: 700; color: #111827; font-family: 'Noto Serif KR', serif; }
  .theme-desc { font-size: 11px; color: #9ca3af; margin-top: 1px; }
  .phone { margin: 0 16px 16px; border-radius: 20px; overflow: hidden; border: 1px solid #ececec; background: #fff; }
  .hero { height: 110px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px 16px; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.05) 100%); }
  .hero-date { color: rgba(255,255,255,0.65); font-size: 10px; position: relative; margin-bottom: 3px; }
  .hero-title { color: #fff; font-size: 16px; font-weight: 700; position: relative; font-family: 'Noto Serif KR', serif; }
  .hero-badge { position: absolute; top: 10px; right: 12px; font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,0.92); }
  .glance { padding: 10px 12px 12px; background: #fff; }
  .glance-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; font-family: 'Noto Serif KR', serif; color: #111827; }
  .glance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .glance-cell { border-radius: 12px; padding: 9px 10px; }
  .glance-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  .glance-icon { width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; }
  .glance-lbl { font-size: 8px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }
  .glance-val { font-size: 15px; font-weight: 700; font-family: 'Noto Serif KR', serif; line-height: 1.2; color: #1f2937; }
  .glance-sub { font-size: 9px; font-weight: 600; margin-top: 1px; }
  .weather { margin: 0 12px 10px; border-radius: 16px; padding: 14px; }
  .wx-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
  .wx-main { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 6px; }
  .wx-temp { font-size: 34px; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1; }
  .wx-icon { font-size: 30px; line-height: 1; }
  .wx-desc { font-size: 11px; color: rgba(255,255,255,0.65); margin-bottom: 8px; }
  .wx-divider { height: 1px; background: rgba(255,255,255,0.18); margin-bottom: 8px; }
  .wx-days { display: flex; justify-content: space-between; }
  .wx-day { text-align: center; }
  .wx-day-lbl { font-size: 9px; color: rgba(255,255,255,0.55); margin-bottom: 3px; }
  .wx-day-icon { font-size: 11px; margin-bottom: 2px; }
  .wx-day-temp { font-size: 11px; font-weight: 600; color: #fff; }
  .itin { padding: 10px 12px 12px; background: #fff; }
  .itin-title { font-size: 12px; font-weight: 700; color: #111827; font-family: 'Noto Serif KR', serif; margin-bottom: 10px; }
  .itin-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .itin-badge { width: 42px; height: 44px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .itin-mo  { font-size: 8px; font-weight: 800; line-height: 1.2; }
  .itin-day { font-size: 16px; font-weight: 800; line-height: 1; }
  .itin-dow { font-size: 8px; font-weight: 600; line-height: 1.3; opacity: 0.75; }
  .itin-content { flex: 1; padding-top: 4px; }
  .itin-city { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
  .itin-spot { font-size: 10px; color: #6b7280; line-height: 1.5; }
</style>
</head>
<body>

<h1>Color Theme Preview</h1>
<p class="subtitle">여행 앱 테마 색상 제안 — 마음에 드는 스타일을 골라주세요</p>

<div class="grid" id="grid"></div>

<script>
const themes = [
  {
    id: 'emerald',
    name: 'Emerald',
    desc: '현재 테마 · 차분한 숲 초록',
    primary: '#436440', light: '#dff0db', mid: '#6b9466',
    cellBg: '#f8faf8', iconBg: '#edf4ec',
    heroBg: 'linear-gradient(135deg,#2d5a27,#436440,#6b9466)',
  },
  {
    id: 'aegean',
    name: 'Aegean',
    desc: '지중해 · 깊고 시원한 청록',
    primary: '#2c5f6e', light: '#d6edf2', mid: '#4d8fa0',
    cellBg: '#f4fafc', iconBg: '#e0f0f5',
    heroBg: 'linear-gradient(135deg,#1a404f,#2c5f6e,#4d8fa0)',
  },
  {
    id: 'sienna',
    name: 'Sienna',
    desc: '이탈리아 · 따뜻한 테라코타',
    primary: '#7a4228', light: '#f5e0d6', mid: '#b07058',
    cellBg: '#fdf8f6', iconBg: '#f5e5de',
    heroBg: 'linear-gradient(135deg,#5c2e18,#7a4228,#b07058)',
  },
  {
    id: 'amethyst',
    name: 'Amethyst',
    desc: '유럽 · 우아한 라벤더 퍼플',
    primary: '#5c4a7a', light: '#e8e0f5', mid: '#8b7ab0',
    cellBg: '#faf8fd', iconBg: '#ede8f7',
    heroBg: 'linear-gradient(135deg,#3d2f5c,#5c4a7a,#8b7ab0)',
  },
  {
    id: 'slate',
    name: 'Slate',
    desc: '도시 · 세련된 차콜 그레이',
    primary: '#374151', light: '#e5e7eb', mid: '#6b7280',
    cellBg: '#f9fafb', iconBg: '#e8eaed',
    heroBg: 'linear-gradient(135deg,#1f2937,#374151,#6b7280)',
  },
  {
    id: 'coral',
    name: 'Coral',
    desc: '열대 · 생동감 있는 코랄',
    primary: '#b5533c', light: '#fde8e2', mid: '#d4806a',
    cellBg: '#fdf7f6', iconBg: '#fae5df',
    heroBg: 'linear-gradient(135deg,#8c3828,#b5533c,#d4806a)',
  },
];

const itinDays = [
  { mo:'SEP', day:'26', dow:'토', city:'인천 → 로마', spots:['이동일'], today:true },
  { mo:'SEP', day:'27', dow:'일', city:'로마', spots:['콜로세움 & 포로 로마노','광장 야경 투어'], today:false },
];

const wxDays = [
  { lbl:'월', icon:'☀️', temp:24 },
  { lbl:'화', icon:'🌤', temp:21 },
  { lbl:'수', icon:'☁️', temp:19 },
  { lbl:'목', icon:'🌧', temp:17 },
];

const glanceCells = [
  { icon:'📅', lbl:'DURATION',  val:'11일',        sub:null },
  { icon:'🌐', lbl:'COUNTRIES', val:'2개국',       sub:'8개 도시' },
  { icon:'💳', lbl:'총 지출',   val:'1,234,567원', sub:null },
  { icon:'🧾', lbl:'오늘 지출', val:'87,400원',    sub:null },
];

function makePhone(t) {
  const glanceHtml = glanceCells.map(c => `
    <div class="glance-cell" style="background:${t.cellBg}">
      <div class="glance-row">
        <div class="glance-icon" style="background:${t.iconBg};color:${t.primary}">${c.icon}</div>
        <span class="glance-lbl" style="color:${t.mid}">${c.lbl}</span>
      </div>
      <div class="glance-val">${c.val}</div>
      ${c.sub ? `<div class="glance-sub" style="color:${t.mid}">${c.sub}</div>` : ''}
    </div>`).join('');

  const wxHtml = wxDays.map(d => `
    <div class="wx-day">
      <div class="wx-day-lbl">${d.lbl}</div>
      <div class="wx-day-icon">${d.icon}</div>
      <div class="wx-day-temp">${d.temp}°</div>
    </div>`).join('');

  const itinHtml = itinDays.map(r => `
    <div class="itin-row">
      <div class="itin-badge" style="background:${r.today ? t.primary : t.light}">
        <div class="itin-mo"  style="color:${r.today ? 'rgba(255,255,255,0.75)' : t.mid}">${r.mo}</div>
        <div class="itin-day" style="color:${r.today ? '#fff' : t.primary}">${r.day}</div>
        <div class="itin-dow" style="color:${r.today ? 'rgba(255,255,255,0.75)' : t.mid}">${r.dow}</div>
      </div>
      <div class="itin-content">
        <div class="itin-city" style="color:${r.today ? t.primary : '#374151'}">${r.city}</div>
        ${r.spots.map(s => `<div class="itin-spot">• ${s}</div>`).join('')}
      </div>
    </div>`).join('');

  return `
  <div class="theme-card">
    <div class="theme-label">
      <div class="theme-dot" style="background:${t.primary}"></div>
      <div>
        <div class="theme-name">${t.name}</div>
        <div class="theme-desc">${t.desc}</div>
      </div>
    </div>
    <div class="phone">
      <div class="hero" style="background:${t.heroBg}">
        <div class="hero-overlay"></div>
        <div class="hero-badge" style="color:${t.primary}">D-38</div>
        <div class="hero-date">2026 · 09.26 — 10.06</div>
        <div class="hero-title">이탈리아 · 스위스</div>
      </div>
      <div class="glance">
        <div class="glance-title">Trip at a glance</div>
        <div class="glance-grid">${glanceHtml}</div>
      </div>
      <div class="weather" style="background:${t.primary}">
        <div class="wx-lbl">Destination Weather</div>
        <div class="wx-main">
          <div class="wx-temp">22°C</div>
          <div class="wx-icon">⛅</div>
        </div>
        <div class="wx-desc">대체로 맑음 · Rome</div>
        <div class="wx-divider"></div>
        <div class="wx-days">${wxHtml}</div>
      </div>
      <div class="itin">
        <div class="itin-title">Itinerary</div>
        ${itinHtml}
      </div>
    </div>
  </div>`;
}

document.getElementById('grid').innerHTML = themes.map(makePhone).join('');
</script>
</body>
</html>
