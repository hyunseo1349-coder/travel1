<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Preview — The Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f1f3f0;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      padding: 40px 24px 60px;
    }

    h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px; font-weight: 700; color: #1a2e1a;
      margin-bottom: 6px;
    }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 36px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 28px;
      max-width: 1080px;
    }

    /* ── Phone shell ── */
    .phone {
      width: 180px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
      background: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .phone:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.22); }
    .phone.active { outline: 3px solid #1d4ed8; outline-offset: 3px; }

    /* ── Status bar ── */
    .status-bar {
      height: 22px;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; font-size: 9px; font-weight: 600;
    }

    /* ── App bar ── */
    .app-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px 8px;
      background: #fff;
    }
    .menu-btn {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .app-bar-title { font-size: 10px; font-weight: 700; }
    .app-bar-pin {
      width: 22px; height: 22px; border-radius: 50%;
      margin-left: auto;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Hero ── */
    .hero {
      height: 100px;
      position: relative;
      display: flex; align-items: flex-end;
    }
    .hero-img {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.05) 60%, transparent);
    }
    .hero-text { position: relative; padding: 10px 12px; color: #fff; }
    .hero-date { font-size: 7px; opacity: 0.6; margin-bottom: 2px; }
    .hero-title { font-family: 'Noto Serif KR', serif; font-size: 13px; font-weight: 700; line-height: 1.3; }

    /* ── Body ── */
    .body { padding: 10px 10px 0; display: flex; flex-direction: column; gap: 7px; }

    /* ── Glance card ── */
    .glance {
      border-radius: 12px; padding: 9px 10px; background: #fff;
    }
    .glance-title { font-size: 8px; font-weight: 700; margin-bottom: 6px; font-family: 'Noto Serif KR', serif; }
    .glance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .glance-cell {
      border-radius: 9px; padding: 7px 8px;
    }
    .cell-icon { width: 16px; height: 16px; border-radius: 5px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; }
    .cell-label { font-size: 6px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 2px; color: #9ca3af; }
    .cell-value { font-size: 12px; font-weight: 800; letter-spacing: -0.02em; color: #1f2937; }

    /* ── Weather card ── */
    .weather {
      border-radius: 12px; padding: 10px 11px;
    }
    .wx-label { font-size: 7px; font-weight: 600; letter-spacing: 0.05em; opacity: 0.7; color: #fff; margin-bottom: 6px; }
    .wx-temp { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1; }
    .wx-desc { font-size: 7px; color: rgba(255,255,255,0.65); margin-top: 2px; }

    /* ── Itinerary ── */
    .itinerary {
      border-radius: 12px; padding: 9px 10px; background: #fff;
    }
    .itin-title { font-size: 8px; font-weight: 700; margin-bottom: 7px; font-family: 'Noto Serif KR', serif; }
    .itin-row { display: flex; gap: 7px; margin-bottom: 7px; align-items: flex-start; }
    .itin-badge {
      width: 30px; height: 34px; border-radius: 11px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .badge-date { font-size: 6px; font-weight: 800; color: #fff; line-height: 1.2; }
    .badge-day  { font-size: 5px; font-weight: 600; line-height: 1; }
    .itin-text { padding-top: 2px; }
    .itin-city { font-size: 7px; font-weight: 700; color: #374151; margin-bottom: 2px; }
    .itin-spot { font-size: 7px; color: #6b7280; line-height: 1.4; }

    /* ── Bottom nav ── */
    .bottom-nav {
      display: flex; justify-content: space-around; align-items: center;
      padding: 8px 0 12px; border-top: 1px solid #f0f0ee;
      background: #fff; margin-top: 7px;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .nav-dot  { width: 20px; height: 3px; border-radius: 999px; }
    .nav-label { font-size: 7px; font-weight: 500; color: #9ca3af; }
    .nav-label.active { font-weight: 700; }

    /* ── Label below phone ── */
    .theme-label {
      text-align: center; margin-top: 10px;
    }
    .theme-name  { font-size: 13px; font-weight: 700; color: #1f2937; }
    .theme-swatch-row { display: flex; gap: 4px; justify-content: center; margin-top: 5px; }
    .swatch { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.08); }
    .theme-desc { font-size: 11px; color: #9ca3af; margin-top: 3px; }
  </style>
</head>
<body>

<h1>컬러 테마 선택</h1>
<p class="subtitle">마음에 드는 테마를 선택하면 여행에 적용할 수 있어요.</p>

<div class="grid" id="theme-grid"></div>

<script>
const THEMES = [
  {
    id: 'sage',
    name: 'Sage Green',
    desc: '현재 테마 · 자연 · 편안함',
    primary:   '#436440',
    light:     '#dff0db',
    lightText: '#2d6b2a',
    accent:    '#6b9466',
    bg:        '#f0f2ee',
    cardBg:    '#f8faf8',
    iconBg:    '#edf4ec',
    swatches:  ['#436440','#dff0db','#6b9466','#f0f2ee'],
  },
  {
    id: 'cobalt',
    name: 'Cobalt Blue',
    desc: '바다 · 하늘 · 신선함',
    primary:   '#1d4ed8',
    light:     '#dbeafe',
    lightText: '#1e40af',
    accent:    '#3b82f6',
    bg:        '#eff4fb',
    cardBg:    '#f5f9ff',
    iconBg:    '#dbeafe',
    swatches:  ['#1d4ed8','#dbeafe','#3b82f6','#eff4fb'],
  },
  {
    id: 'terracotta',
    name: 'Terracotta',
    desc: '이탈리아 · 따뜻함 · 낭만',
    primary:   '#b5451b',
    light:     '#fde8df',
    lightText: '#92340e',
    accent:    '#d4724a',
    bg:        '#faf3f0',
    cardBg:    '#fff8f5',
    iconBg:    '#fde8df',
    swatches:  ['#b5451b','#fde8df','#d4724a','#faf3f0'],
  },
  {
    id: 'midnight',
    name: 'Midnight',
    desc: '고급스러움 · 심플 · 모던',
    primary:   '#312e81',
    light:     '#e0e7ff',
    lightText: '#3730a3',
    accent:    '#6366f1',
    bg:        '#f0f0f7',
    cardBg:    '#f6f6fc',
    iconBg:    '#e0e7ff',
    swatches:  ['#312e81','#e0e7ff','#6366f1','#f0f0f7'],
  },
  {
    id: 'rose',
    name: 'Rose',
    desc: '로맨틱 · 감성 · 여행 일기',
    primary:   '#9d174d',
    light:     '#fde7ef',
    lightText: '#831843',
    accent:    '#ec4899',
    bg:        '#fdf0f5',
    cardBg:    '#fff5f9',
    iconBg:    '#fde7ef',
    swatches:  ['#9d174d','#fde7ef','#ec4899','#fdf0f5'],
  },
  {
    id: 'amber',
    name: 'Amber Sand',
    desc: '사막 · 모로코 · 따사로움',
    primary:   '#92400e',
    light:     '#fef3c7',
    lightText: '#78350f',
    accent:    '#d97706',
    bg:        '#fdf8ee',
    cardBg:    '#fffcf3',
    iconBg:    '#fef3c7',
    swatches:  ['#92400e','#fef3c7','#d97706','#fdf8ee'],
  },
];

function phoneHTML(t) {
  const todayBadge = `background:${t.primary}`;
  const otherBadge = `background:${t.light}`;
  return `
    <div class="status-bar" style="background:${t.bg}; color:${t.primary}">9:41</div>

    <div class="app-bar" style="background:#fff; border-bottom:1px solid ${t.light}">
      <div class="menu-btn" style="background:${t.iconBg}; color:${t.primary}">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
      <span class="app-bar-title" style="color:#1a2e1a">Summary</span>
      <div class="app-bar-pin" style="background:${t.primary}; margin-left:auto">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M12 2C8 2 5 6 5 10c0 5.25 7 12 7 12s7-6.75 7-12c0-4-3-8-7-8zm0 10.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
      </div>
    </div>

    <div class="hero">
      <div class="hero-img" style="background:linear-gradient(135deg, ${t.primary}cc, ${t.accent})"></div>
      <div class="hero-overlay"></div>
      <div class="hero-text">
        <div class="hero-date">2026 · 04.12 — 04.26</div>
        <div class="hero-title">이탈리아·스위스</div>
      </div>
    </div>

    <div class="body" style="background:${t.bg}">

      <div class="glance">
        <div class="glance-title" style="color:#111827">Trip at a glance</div>
        <div class="glance-grid">
          ${['15일','2개국','1,240,000원','42,000원'].map((v,i) => `
          <div class="glance-cell" style="background:${t.cardBg}">
            <div class="cell-icon" style="background:${t.iconBg}; color:${t.primary}">
              <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div class="cell-label">${['DURATION','COUNTRIES','총 지출','오늘'][i]}</div>
            <div class="cell-value" style="font-size:${v.length>6?'9px':'12px'}">${v}</div>
          </div>`).join('')}
        </div>
      </div>

      <div class="weather" style="background:${t.primary}">
        <div class="wx-label">Destination Weather</div>
        <div style="display:flex;align-items:flex-end;justify-content:space-between">
          <div>
            <div class="wx-temp">18°C</div>
            <div class="wx-desc">대체로 맑음 · Rome</div>
          </div>
          <span style="font-size:22px;line-height:1;margin-bottom:2px">🌤</span>
        </div>
      </div>

      <div class="itinerary">
        <div class="itin-title" style="color:#111827">Itinerary</div>
        ${[
          {date:'04/12',day:'토',city:'로마',spot:'콜로세움',today:true},
          {date:'04/13',day:'일',city:'로마',spot:'바티칸 박물관',today:false},
          {date:'04/14',day:'월',city:'피렌체',spot:'우피치 미술관',today:false},
        ].map(r => `
        <div class="itin-row">
          <div class="itin-badge" style="${r.today ? todayBadge : otherBadge}">
            <div class="badge-date" style="color:${r.today?'#fff':t.lightText}">${r.date}</div>
            <div class="badge-day"  style="color:${r.today?'rgba(255,255,255,0.75)':t.accent}">${r.day}</div>
          </div>
          <div class="itin-text">
            <div class="itin-city" style="color:${r.today?t.primary:'#374151'}">${r.today?'● ':''} ${r.city}</div>
            <div class="itin-spot">• ${r.spot}</div>
          </div>
        </div>`).join('')}
      </div>

    </div>

    <div class="bottom-nav">
      ${[
        {label:'홈', active:true},
        {label:'일정', active:false},
        {label:'예산', active:false},
      ].map(n => `
      <div class="nav-item">
        <div class="nav-dot" style="background:${n.active ? t.primary : '#e5e7eb'}"></div>
        <span class="nav-label ${n.active?'active':''}" style="${n.active?'color:'+t.primary:''}">${n.label}</span>
      </div>`).join('')}
    </div>
  `;
}

const grid = document.getElementById('theme-grid');
THEMES.forEach(t => {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center';

  const phone = document.createElement('div');
  phone.className = 'phone' + (t.id === 'sage' ? ' active' : '');
  phone.innerHTML = phoneHTML(t);
  phone.onclick = () => {
    document.querySelectorAll('.phone').forEach(p => p.classList.remove('active'));
    phone.classList.add('active');
  };

  const label = document.createElement('div');
  label.className = 'theme-label';
  label.innerHTML = `
    <div class="theme-name">${t.name}</div>
    <div class="theme-swatch-row">
      ${t.swatches.map(c => `<div class="swatch" style="background:${c}"></div>`).join('')}
    </div>
    <div class="theme-desc">${t.desc}</div>
  `;

  wrap.appendChild(phone);
  wrap.appendChild(label);
  grid.appendChild(wrap);
});
</script>
</body>
</html>
